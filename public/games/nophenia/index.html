<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0"
    />
    <title>nophenia</title>
    <style>
      html,
      body,
      #canvas {
        margin: 0;
        padding: 0;
        border: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        overflow: hidden;
        background: #020306;
        color: #f6f0ea;
        touch-action: none;
      }

      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #020306;
      }

      #canvas:focus {
        outline: none;
      }

      #status,
      #status-splash,
      #status-progress {
        position: absolute;
        right: 0;
        left: 0;
      }

      #status,
      #status-splash {
        top: 0;
        bottom: 0;
      }

      #status {
        display: flex;
        visibility: hidden;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #05070d;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      #status-splash {
        max-width: min(420px, 84vw);
        max-height: 62vh;
        margin: auto;
        object-fit: contain;
        opacity: 0.92;
      }

      #status-progress {
        bottom: 11%;
        width: min(420px, calc(100vw - 56px));
        height: 10px;
        margin: 0 auto;
        accent-color: #6ddfc4;
      }

      #status-notice {
        z-index: 1;
        display: none;
        max-width: min(560px, calc(100vw - 48px));
        overflow: hidden;
        border: 1px solid #80596c;
        border-radius: 8px;
        background: #2c1720;
        color: #f6d6df;
        line-height: 1.45;
        padding: 1rem;
        text-align: center;
      }
    </style>
    <link rel="icon" type="image/png" href="index.icon.png" />
    <link rel="apple-touch-icon" href="index.apple-touch-icon.png" />
  </head>
  <body>
    <canvas id="canvas">Your browser does not support the canvas tag.</canvas>

    <noscript>Your browser does not support JavaScript.</noscript>

    <div id="status">
      <img id="status-splash" src="index.png" alt="" />
      <progress id="status-progress"></progress>
      <div id="status-notice"></div>
    </div>

    <script src="index.js"></script>
    <script>
      const GODOT_CONFIG = {
        args: [],
        canvasResizePolicy: 2,
        emscriptenPoolSize: 8,
        ensureCrossOriginIsolationHeaders: true,
        executable: '/api/games/nophenia/index',
        experimentalVK: false,
        fileSizes: {
          '/api/games/nophenia/index.pck': 53914688,
          '/api/games/nophenia/index.wasm': 38034280,
        },
        focusCanvas: true,
        gdextensionLibs: [],
        godotPoolSize: 4,
        mainPack: '/api/games/nophenia/index.pck',
      };
      const GODOT_THREADS_ENABLED = false;
      const engine = new Engine(GODOT_CONFIG);
      const canvas = document.getElementById('canvas');

      window.nopheniaResize = function () {
        canvas.style.width = '100vw';
        canvas.style.height = '100vh';
      };

      window.nopheniaSetFullscreen = function (fullscreen) {
        if (!fullscreen) {
          if (document.fullscreenElement) {
            document.exitFullscreen();
            return true;
          }

          return false;
        }

        if (canvas.requestFullscreen) {
          canvas.requestFullscreen();
          return true;
        }

        return false;
      };

      (function () {
        const statusOverlay = document.getElementById('status');
        const statusProgress = document.getElementById('status-progress');
        const statusNotice = document.getElementById('status-notice');

        let initializing = true;
        let statusMode = '';

        function setStatusMode(mode) {
          if (statusMode === mode || !initializing) {
            return;
          }

          if (mode === 'hidden') {
            statusOverlay.remove();
            initializing = false;
            return;
          }

          statusOverlay.style.visibility = 'visible';
          statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
          statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
          statusMode = mode;
        }

        function setStatusNotice(text) {
          while (statusNotice.lastChild) {
            statusNotice.removeChild(statusNotice.lastChild);
          }

          text.split('\n').forEach((line) => {
            statusNotice.appendChild(document.createTextNode(line));
            statusNotice.appendChild(document.createElement('br'));
          });
        }

        function displayFailureNotice(err) {
          console.error(err);
          setStatusNotice(err instanceof Error ? err.message : String(err));
          setStatusMode('notice');
          initializing = false;
        }

        const missing = Engine.getMissingFeatures({
          threads: GODOT_THREADS_ENABLED,
        });

        if (missing.length !== 0) {
          displayFailureNotice(
            'Error\nThe following features required to run Nophenia are missing:\n' +
              missing.join('\n')
          );
          return;
        }

        setStatusMode('progress');
        engine
          .startGame({
            onProgress(current, total) {
              if (current > 0 && total > 0) {
                statusProgress.value = current;
                statusProgress.max = total;
              } else {
                statusProgress.removeAttribute('value');
                statusProgress.removeAttribute('max');
              }
            },
          })
          .then(() => {
            setStatusMode('hidden');
            window.nopheniaResize();
          }, displayFailureNotice);
      })();
    </script>
  </body>
</html>
